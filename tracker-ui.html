<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Bounty Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: '#0F1115',
            surface: '#1A1D24',
            surfaceHover: '#2A2D35',
            border: '#2E323A',
            primary: '#5C6BC0',
            textMain: '#E2E8F0',
            textMuted: '#94A3B8',
            accentG: '#10B981',
            accentR: '#EF4444',
            accentY: '#F59E0B'
          }
        }
      }
    }
  </script>
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    body { background-color: #0F1115; color: #E2E8F0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
    .scroll-custom::-webkit-scrollbar { width: 8px; height: 8px; }
    .scroll-custom::-webkit-scrollbar-track { background: transparent; }
    .scroll-custom::-webkit-scrollbar-thumb { background: #2E323A; border-radius: 4px; }
    .scroll-custom::-webkit-scrollbar-thumb:hover { background: #4A5568; }
    .method-GET { color: #3B82F6; }
    .method-POST { color: #10B981; }
    .method-PATCH { color: #F59E0B; }
    .method-PUT { color: #F59E0B; }
    .method-DELETE { color: #EF4444; }
    .method-HEAD { color: #8B5CF6; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [state, setState] = useState(null);
      const [activePhaseIndex, setActivePhaseIndex] = useState(0);
      const [activeEndpointId, setActiveEndpointId] = useState(null);
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        fetch('/api/state')
          .then(res => res.json())
          .then(data => {
            setState(data);
            if (data.phases.length > 0) {
              setActiveEndpointId(data.phases[0].endpoints[0]?.id || null);
            }
          });
      }, []);

      const saveState = async (newState) => {
        setState(newState);
        setSaving(true);
        await fetch('/api/state', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newState)
        });
        setTimeout(() => setSaving(false), 500);
      };

      if (!state) return <div className="flex h-screen items-center justify-center text-textMuted"><i className="ph ph-spinner-gap animate-spin text-3xl mr-3"></i> Loading Plannotator-style UI...</div>;

      const activePhase = state.phases[activePhaseIndex];
      const activeEndpoint = activePhase?.endpoints.find(e => e.id === activeEndpointId);

      // Handlers
      const updateEndpoint = (id, field, value) => {
        const newState = { ...state };
        const phase = newState.phases[activePhaseIndex];
        const ep = phase.endpoints.find(e => e.id === id);
        if (ep) {
          ep[field] = value;
          saveState(newState);
        }
      };

      const toggleTest = (id) => {
        const newState = { ...state };
        const phase = newState.phases[activePhaseIndex];
        const test = phase.tests.find(t => t.id === id);
        if (test) {
          test.completed = !test.completed;
          saveState(newState);
        }
      };

      const getStatusColor = (status) => {
        switch(status) {
          case 'secure': return 'text-accentG border-accentG/30 bg-accentG/10';
          case 'vulnerable': return 'text-accentR border-accentR/30 bg-accentR/10';
          case 'investigating': return 'text-accentY border-accentY/30 bg-accentY/10';
          default: return 'text-textMuted border-border bg-surface';
        }
      };

      const totalEndpoints = state.phases.reduce((acc, p) => acc + p.endpoints.length, 0);
      const testedEndpoints = state.phases.reduce((acc, p) => acc + p.endpoints.filter(e => e.status !== 'pending').length, 0);

      return (
        <div className="flex flex-col h-screen overflow-hidden bg-bg">
          {/* Header */}
          <header className="flex items-center justify-between px-4 py-3 border-b border-border bg-surface">
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 rounded bg-primary flex items-center justify-center text-white font-bold">
                <i className="ph ph-bug"></i>
              </div>
              <h1 className="font-semibold text-textMain tracking-wide">Bug Bounty Tracker</h1>
              <span className="text-xs px-2 py-1 bg-bg rounded text-textMuted border border-border ml-2 font-mono">localhost:8080</span>
            </div>
            <div className="flex items-center gap-4 text-sm text-textMuted">
              <div className="flex items-center gap-2">
                <div className="w-48 h-2 bg-bg rounded-full overflow-hidden border border-border">
                  <div className="h-full bg-primary" style={{width: `${Math.round((testedEndpoints/totalEndpoints)*100)}%`}}></div>
                </div>
                <span className="font-mono">{testedEndpoints}/{totalEndpoints}</span>
              </div>
              <div className="flex items-center gap-2">
                {saving ? <><i className="ph ph-arrows-clockwise animate-spin"></i> Saving...</> : <><i className="ph ph-check text-accentG"></i> Saved</>}
              </div>
            </div>
          </header>

          <div className="flex flex-1 overflow-hidden">
            {/* Sidebar - Phases */}
            <div className="w-64 border-r border-border bg-bg flex flex-col">
              <div className="p-3 border-b border-border text-xs font-semibold text-textMuted uppercase tracking-wider">
                Target Scope
              </div>
              <div className="flex-1 overflow-y-auto scroll-custom p-2">
                {state.phases.map((phase, idx) => (
                  <button 
                    key={idx}
                    onClick={() => { setActivePhaseIndex(idx); setActiveEndpointId(phase.endpoints[0]?.id || null); }}
                    className={`w-full text-left px-3 py-2 rounded mb-1 text-sm flex items-center justify-between transition-colors ${activePhaseIndex === idx ? 'bg-surface border border-border text-textMain font-medium' : 'text-textMuted hover:bg-surfaceHover border border-transparent'}`}
                  >
                    <span className="truncate pr-2">{phase.name}</span>
                    <span className="text-xs bg-bg px-1.5 py-0.5 rounded border border-border font-mono">{phase.endpoints.length}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* Middle Panel - Endpoints List */}
            <div className="w-96 border-r border-border bg-surface flex flex-col">
              <div className="p-3 border-b border-border bg-surface text-sm font-semibold text-textMain flex items-center justify-between">
                <span>{activePhase?.name}</span>
                <span className="text-xs text-textMuted font-normal">{activePhase?.endpoints.length} endpoints</span>
              </div>
              <div className="flex-1 overflow-y-auto scroll-custom">
                {activePhase?.endpoints.map(ep => (
                  <div 
                    key={ep.id}
                    onClick={() => setActiveEndpointId(ep.id)}
                    className={`p-3 border-b border-border cursor-pointer transition-colors ${activeEndpointId === ep.id ? 'bg-bg border-l-2 border-l-primary' : 'hover:bg-surfaceHover border-l-2 border-l-transparent'}`}
                  >
                    <div className="flex items-center justify-between mb-1">
                      <span className={`text-xs font-mono font-bold method-${ep.method}`}>{ep.method}</span>
                      <span className={`text-[10px] uppercase px-1.5 py-0.5 rounded border ${getStatusColor(ep.status)}`}>{ep.status}</span>
                    </div>
                    <div className="font-mono text-sm text-textMain truncate" title={ep.path}>{ep.path}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Right Panel - Details & Annotations */}
            <div className="flex-1 bg-bg flex flex-col overflow-hidden relative">
              {activeEndpoint ? (
                <>
                  {/* Top: HTTP Request Details */}
                  <div className="p-6 border-b border-border flex-none">
                    <div className="flex items-center justify-between mb-4">
                      <div className="flex items-center gap-3">
                        <span className={`text-lg font-mono font-bold method-${activeEndpoint.method}`}>{activeEndpoint.method}</span>
                        <h2 className="text-xl font-mono text-textMain">{activeEndpoint.path}</h2>
                      </div>
                      <select 
                        value={activeEndpoint.status}
                        onChange={(e) => updateEndpoint(activeEndpoint.id, 'status', e.target.value)}
                        className={`bg-surface border text-sm rounded px-3 py-1.5 outline-none cursor-pointer ${getStatusColor(activeEndpoint.status)}`}
                      >
                        <option value="pending" className="text-textMain bg-surface">Pending</option>
                        <option value="investigating" className="text-accentY bg-surface">Investigating</option>
                        <option value="vulnerable" className="text-accentR bg-surface">Vulnerable!</option>
                        <option value="secure" className="text-accentG bg-surface">Secure</option>
                      </select>
                    </div>
                    
                    <div className="bg-surface border border-border rounded p-3 font-mono text-sm text-textMuted mb-2">
                      <div className="text-xs text-textMain/50 uppercase tracking-widest mb-1">Body / Params</div>
                      <div className="break-words text-textMain">{activeEndpoint.params || "No parameters specified"}</div>
                    </div>
                  </div>

                  {/* Bottom: Annotation / Notes Workspace (like Plannotator) */}
                  <div className="flex-1 flex overflow-hidden">
                    {/* Notes Area */}
                    <div className="flex-1 p-6 flex flex-col border-r border-border">
                      <div className="flex items-center gap-2 mb-4 text-sm font-semibold text-textMain uppercase tracking-wider">
                        <i className="ph ph-note-pencil text-primary text-lg"></i>
                        Vulnerability Notes
                      </div>
                      <textarea 
                        value={activeEndpoint.notes || ''}
                        onChange={(e) => updateEndpoint(activeEndpoint.id, 'notes', e.target.value)}
                        placeholder="Add penetration testing notes, exploit payloads, or findings here. Supports raw text."
                        className="flex-1 w-full bg-surface border border-border rounded p-4 text-textMain text-sm font-mono focus:outline-none focus:border-primary/50 resize-none scroll-custom transition-colors"
                      />
                    </div>

                    {/* Phase Attack Plan Checkboxes */}
                    <div className="w-80 bg-surface flex flex-col">
                      <div className="p-4 border-b border-border bg-surface text-sm font-semibold text-textMain flex items-center gap-2 uppercase tracking-wider">
                        <i className="ph ph-shield-check text-primary text-lg"></i>
                        Attack Vectors
                      </div>
                      <div className="flex-1 overflow-y-auto scroll-custom p-4 space-y-3">
                        {activePhase?.tests.map(test => (
                          <label key={test.id} className="flex items-start gap-3 group cursor-pointer">
                            <div className={`mt-0.5 flex-none w-4 h-4 rounded flex items-center justify-center border transition-colors ${test.completed ? 'bg-primary border-primary' : 'border-border bg-bg group-hover:border-primary/50'}`}>
                              {test.completed && <i className="ph ph-check text-white text-xs"></i>}
                            </div>
                            <input 
                              type="checkbox" 
                              checked={test.completed}
                              onChange={() => toggleTest(test.id)}
                              className="hidden" 
                            />
                            <span className={`text-sm leading-tight transition-colors ${test.completed ? 'text-textMuted line-through' : 'text-textMain'}`}>
                              {test.description}
                            </span>
                          </label>
                        ))}
                        {activePhase?.tests.length === 0 && (
                          <div className="text-xs text-textMuted text-center mt-4 italic">No specific tests generated for this phase.</div>
                        )}
                      </div>
                    </div>
                  </div>
                </>
              ) : (
                <div className="flex-1 flex flex-col items-center justify-center text-textMuted bg-bg">
                  <i className="ph ph-mouse-left text-4xl mb-3 opacity-50"></i>
                  <p>Select an endpoint from the panel to annotate</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
